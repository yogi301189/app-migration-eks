name: Build and Deploy to EKS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com
  CLUSTER_NAME: app-migration-cluster

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Flask API image
        run: |
          docker build -t $ECR_REGISTRY/app-migration/flask-api:${{ github.sha }} ./app
          docker push $ECR_REGISTRY/app-migration/flask-api:${{ github.sha }}
          # Also tag as latest
          docker tag $ECR_REGISTRY/app-migration/flask-api:${{ github.sha }} \
            $ECR_REGISTRY/app-migration/flask-api:latest
          docker push $ECR_REGISTRY/app-migration/flask-api:latest

      - name: Build and push Nginx image
        run: |
          docker build -t $ECR_REGISTRY/app-migration/nginx:${{ github.sha }} ./nginx
          docker push $ECR_REGISTRY/app-migration/nginx:${{ github.sha }}
          docker tag $ECR_REGISTRY/app-migration/nginx:${{ github.sha }} \
            $ECR_REGISTRY/app-migration/nginx:latest
          docker push $ECR_REGISTRY/app-migration/nginx:latest

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $CLUSTER_NAME

      - name: Deploy to EKS
        run: |
          # Update image tags to the new commit SHA — rolling update
          kubectl set image deployment/flask-api \
            flask-api=$ECR_REGISTRY/app-migration/flask-api:${{ github.sha }} \
            -n app-migration

          kubectl set image deployment/nginx \
            nginx=$ECR_REGISTRY/app-migration/nginx:${{ github.sha }} \
            -n app-migration

          # Wait for rollout to complete
          kubectl rollout status deployment/flask-api -n app-migration
          kubectl rollout status deployment/nginx -n app-migration